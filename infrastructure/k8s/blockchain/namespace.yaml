# Kubernetes namespace for blockchain and IoT services
# See: docs/specs/08_INFRASTRUCTURE_IaC.md

apiVersion: v1
kind: Namespace
metadata:
  name: lmg-blockchain
  labels:
    app.kubernetes.io/part-of: lastmile-gig
    app.kubernetes.io/managed-by: helm
    istio-injection: enabled
  annotations:
    description: "Blockchain and IoT services for the Lastmile Gig platform"

---

# Network policy: restrict egress to only required services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: blockchain-network-policy
  namespace: lmg-blockchain
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: lastmile-gig
      ports:
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 5001
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow Polygon CDK RPC
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8545
    # Allow Kafka
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: lastmile-gig
      ports:
        - protocol: TCP
          port: 9092
    # Allow MQTT
    - to: []
      ports:
        - protocol: TCP
          port: 1883
        - protocol: TCP
          port: 8883
    # Allow TimescaleDB
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: lastmile-gig
      ports:
        - protocol: TCP
          port: 5432

---

# Resource quotas for the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: blockchain-quota
  namespace: lmg-blockchain
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "50"
    services: "10"

---

# Limit range for pods
apiVersion: v1
kind: LimitRange
metadata:
  name: blockchain-limits
  namespace: lmg-blockchain
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      type: Container
