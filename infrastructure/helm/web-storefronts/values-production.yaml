# =============================================================================
# Lastmile Gig - web-storefronts Helm Values (Production)
# Phase P202 - Storefront Service Docker + Helm
# =============================================================================

replicaCount: 3

image:
  pullPolicy: Always

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

ingress:
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://lastmilegig.aagais.co.za"

env:
  - name: NODE_ENV
    value: "production"
  - name: NEXT_TELEMETRY_DISABLED
    value: "1"
  - name: LMG_API_INTERNAL_URL
    value: "http://svc-storefronts.lmg-core.svc.cluster.local:3000"
  - name: NEXT_PUBLIC_LMG_API_URL
    value: "https://api.lastmilegig.aagais.co.za/v1"
  - name: NEXT_PUBLIC_LMG_WS_URL
    value: "wss://ws.lastmilegig.aagais.co.za"
