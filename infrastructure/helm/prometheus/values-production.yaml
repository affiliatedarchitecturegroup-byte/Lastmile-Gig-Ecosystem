# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - Prometheus Production Overrides
# Phase: P031-P032 | Production configuration
# -------------------------------------------------------------------

kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      replicas: 3
      retention: 30d
      retentionSize: "100GB"

      resources:
        requests:
          cpu: "1000m"
          memory: "4Gi"
        limits:
          cpu: "4000m"
          memory: "16Gi"

      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 200Gi

      # Enable Thanos sidecar for long-term storage
      thanos:
        objectStorageConfig:
          existingSecret:
            name: thanos-objstore-config
            key: thanos.yaml

  alertmanager:
    alertmanagerSpec:
      replicas: 3
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
