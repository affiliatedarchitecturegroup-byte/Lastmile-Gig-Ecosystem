# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - ServiceMonitor CRDs
# Phase: P032 | ServiceMonitor configs for all LMG namespaces
# -------------------------------------------------------------------

# API Gateway ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lmg-api-gateway
  namespace: lmg-monitoring
  labels:
    monitoring: lmg-platform
    app.kubernetes.io/part-of: lastmile-gig
spec:
  selector:
    matchLabels:
      app: api-gateway
  namespaceSelector:
    matchNames:
      - lmg-core
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      scrapeTimeout: 10s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "lmg_.*"
          action: keep
---
