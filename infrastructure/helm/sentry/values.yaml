# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - Sentry Configuration
# Phase: P040 | Sentry project setup, DSNs for all services
# -------------------------------------------------------------------

# Sentry SDK configuration for all LMG services
# Each service embeds its own Sentry SDK; this file documents DSN mapping
# and shared configuration. DSNs are stored in Vault.

sentry:
  # Organisation configuration
  organisation: lastmile-gig
  url: https://sentry.internal.lastmilegig.aagais.co.za

  # Global configuration applied to all SDKs
  global:
    environment: ${LMG_ENVIRONMENT}
    release: ${LMG_RELEASE_VERSION}
    sampleRate: 1.0
    tracesSampleRate: 0.2
    profilesSampleRate: 0.1
    maxBreadcrumbs: 100
    attachStacktrace: true
    sendDefaultPii: false  # POPIA compliance - never send PII
    beforeSend: "filterSensitiveData"  # Custom filter function name

  # Project-to-DSN mapping (DSN values in Vault at secret/sentry/dsns/*)
  projects:
    # TypeScript/NestJS Services
    - name: api-gateway
      platform: node
      language: typescript
      dsn_vault_path: secret/sentry/dsns/api-gateway
      team: platform
      alertRules:
        - type: issue_frequency
          threshold: 50
          interval: 1h
          action: pagerduty

    - name: svc-auth
      platform: node
      language: typescript
      dsn_vault_path: secret/sentry/dsns/svc-auth
      team: platform
      alertRules:
        - type: issue_frequency
          threshold: 20
          interval: 1h
          action: pagerduty

    - name: svc-drivers
      platform: node
      language: typescript
      dsn_vault_path: secret/sentry/dsns/svc-drivers
      team: drivers
      alertRules:
        - type: issue_frequency
          threshold: 30
          interval: 1h
          action: pagerduty

    - name: svc-orders
      platform: node
      language: typescript
      dsn_vault_path: secret/sentry/dsns/svc-orders
      team: orders
      alertRules:
        - type: issue_frequency
          threshold: 30
          interval: 1h
          action: pagerduty

    - name: svc-fleet
      platform: node
      language: typescript
      dsn_vault_path: secret/sentry/dsns/svc-fleet
      team: fleet
      alertRules:
        - type: issue_frequency
          threshold: 20
          interval: 1h
          action: slack

    - name: svc-storefronts
      platform: node
      language: typescript
      dsn_vault_path: secret/sentry/dsns/svc-storefronts
      team: storefronts
      alertRules:
        - type: issue_frequency
          threshold: 30
          interval: 1h
          action: pagerduty

    # Python/FastAPI Services
    - name: svc-ai
      platform: python
      language: python
      dsn_vault_path: secret/sentry/dsns/svc-ai
      team: ai
      alertRules:
        - type: issue_frequency
          threshold: 20
          interval: 1h
          action: slack

    - name: svc-agents
      platform: python
