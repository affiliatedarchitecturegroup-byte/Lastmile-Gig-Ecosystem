# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - OpenTelemetry Collector Configuration
# Phase: P038 | OTel Collector DaemonSet, exporting to Tempo + Loki
# -------------------------------------------------------------------

opentelemetry-collector:
  enabled: true

  mode: daemonset

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.96.0"

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # Ports exposed by the collector
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      hostPort: 4318
      protocol: TCP
    jaeger-compact:
      enabled: true
      containerPort: 6831
      servicePort: 6831
      protocol: UDP
    jaeger-thrift:
      enabled: true
      containerPort: 14268
      servicePort: 14268
      protocol: TCP
    jaeger-grpc:
      enabled: true
      containerPort: 14250
      servicePort: 14250
      protocol: TCP
    zipkin:
      enabled: true
      containerPort: 9411
      servicePort: 9411
      protocol: TCP
    prometheus:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            max_recv_msg_size_mib: 4
          http:
            endpoint: "0.0.0.0:4318"
            cors:
              allowed_origins:
                - "https://*.lastmilegig.aagais.co.za"
              allowed_headers:
                - "*"

      jaeger:
        protocols:
          thrift_http:
            endpoint: "0.0.0.0:14268"
          grpc:
            endpoint: "0.0.0.0:14250"
          thrift_compact:
            endpoint: "0.0.0.0:6831"

      zipkin:
        endpoint: "0.0.0.0:9411"

      # Scrape Prometheus metrics from instrumented services
      prometheus:
        config:
          scrape_configs:
            - job_name: "otel-collector"
              scrape_interval: 15s
              static_configs:
                - targets: ["0.0.0.0:8888"]

      # Kubernetes events receiver
      k8s_events:
        auth_type: serviceAccount
        namespaces: []

      # Host metrics
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          disk: {}
          filesystem: {}
          load: {}
          memory: {}
          network: {}
          paging: {}

    processors:
      # Batch processor for efficient export
      batch:
        send_batch_size: 1024
        send_batch_max_size: 2048
        timeout: 5s

      # Memory limiter to prevent OOM
      memory_limiter:
        check_interval: 5s
        limit_mib: 800
        spike_limit_mib: 200

      # Resource detection for Kubernetes metadata
      resourcedetection:
        detectors: [env, eks, ec2, system]
        timeout: 5s
        override: false

      # Kubernetes attributes enrichment
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
            - k8s.node.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: version
              key: version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Add LMG-specific resource attributes
      resource:
        attributes:
          - key: platform
            value: lastmile-gig
            action: upsert
          - key: environment
            value: ${LMG_ENVIRONMENT}
            action: upsert
          - key: region
            value: af-south-1
            action: upsert

      # Tail-based sampling for traces
      tail_sampling:
        decision_wait: 10s
        num_traces: 100000
        expected_new_traces_per_sec: 1000
        policies:
          # Always sample errors
          - name: errors-policy
            type: status_code
            status_code:
              status_codes:
                - ERROR
          # Always sample high-latency traces
          - name: latency-policy
            type: latency
            latency:
              threshold_ms: 2000
          # Sample 10% of normal traces
          - name: probabilistic-policy
            type: probabilistic
            probabilistic:
              sampling_percentage: 10
          # Always sample payment traces
          - name: payment-traces
            type: string_attribute
            string_attribute:
              key: service.name
              values:
                - svc-payments
          # Always sample dispatch traces
          - name: dispatch-traces
            type: string_attribute
            string_attribute:
              key: service.name
              values:
                - svc-dispatch

      # Filter out health check spans
      filter:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.route"] == "/health"'
            - 'attributes["http.route"] == "/ready"'
            - 'attributes["http.route"] == "/metrics"'

    exporters:
      # Tempo for traces
      otlp/tempo:
        endpoint: lmg-tempo-distributor.lmg-monitoring:4317
        tls:
          insecure: true
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      # Loki for logs
      loki:
        endpoint: http://lmg-loki-gateway.lmg-monitoring:3100/loki/api/v1/push
        default_labels_enabled:
          exporter: true
          job: true
          instance: true
          level: true

      # Prometheus remote write for metrics
      prometheusremotewrite:
        endpoint: http://lmg-prometheus-kube-prometheus-prometheus.lmg-monitoring:9090/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        external_labels:
          cluster: lmg-production
          source: otel-collector

      # Self-monitoring metrics
      prometheus:
        endpoint: "0.0.0.0:8889"
        resource_to_telemetry_conversion:
          enabled: true

      # Debug logging (disabled in production)
      debug:
        verbosity: basic

    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
      zpages:
        endpoint: "0.0.0.0:55679"
      pprof:
        endpoint: "0.0.0.0:1777"

    service:
      extensions: [health_check, zpages, pprof]
      pipelines:
        traces:
          receivers: [otlp, jaeger, zipkin]
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, filter, tail_sampling, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp, prometheus, hostmetrics]
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp, k8s_events]
          processors: [memory_limiter, resourcedetection, k8sattributes, resource, batch]
          exporters: [loki]

  # Tolerations to run on all nodes
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

  # Service account
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::role/lmg-otel-collector-role

  # Cluster role for k8s metadata access
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["pods", "namespaces", "nodes", "endpoints"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["batch"]
        resources: ["jobs", "cronjobs"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["events.k8s.io"]
        resources: ["events"]
        verbs: ["get", "list", "watch"]
