# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - Loki Log Aggregation Configuration
# Phase: P035 | Loki installation & log collection
# -------------------------------------------------------------------

loki:
  enabled: true

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 2
      path_prefix: /var/loki

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage:
      type: s3
      s3:
        region: af-south-1
        bucketnames: lmg-loki-logs
        endpoint: s3.af-south-1.amazonaws.com
      bucketNames:
        chunks: lmg-loki-chunks
        ruler: lmg-loki-ruler
        admin: lmg-loki-admin

    limits_config:
      ingestion_rate_mb: 20
      ingestion_burst_size_mb: 30
      max_streams_per_user: 10000
      max_global_streams_per_user: 50000
      retention_period: 30d
      max_query_length: 721h
      max_query_series: 5000

    compactor:
      working_directory: /var/loki/compactor
      shared_store: s3
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h

    ruler:
      storage:
        type: s3
        s3:
          region: af-south-1
          bucketnames: lmg-loki-ruler
      alertmanager_url: http://lmg-prometheus-alertmanager.lmg-monitoring:9093

    analytics:
      reporting_enabled: false

  # Single binary mode for dev, switch to distributed for prod
  deploymentMode: SimpleScalable

  read:
    replicas: 2
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

  write:
    replicas: 3
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    persistence:
      size: 50Gi
      storageClass: gp3

  backend:
    replicas: 2
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    persistence:
      size: 20Gi
      storageClass: gp3

  gateway:
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  # Service account for S3 access via IRSA
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::role/lmg-loki-s3-role

# -- Promtail Configuration
promtail:
  enabled: true

  config:
    clients:
      - url: http://lmg-loki-gateway.lmg-monitoring:3100/loki/api/v1/push
        tenant_id: ""

    snippets:
      pipelineStages:
        # Extract structured fields from JSON logs
        - json:
            expressions:
              level: level
              service: service
              trace_id: trace_id
              span_id: span_id
              message: msg
        - labels:
            level:
            service:
            trace_id:
        # Drop debug logs in production
        - match:
            selector: '{level="debug"}'
            stages:
              - drop:
                  expression: ".*"
                  older_than: 1h
        # Timestamp extraction
        - timestamp:
            source: timestamp
            format: RFC3339Nano

      extraRelabelConfigs:
        # Add namespace label
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        # Add pod name label
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
        # Add container name label
        - source_labels: [__meta_kubernetes_pod_container_name]
          target_label: container
        # Add node name label
        - source_labels: [__meta_kubernetes_pod_node_name]
          target_label: node

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  tolerations:
    - effect: NoSchedule
      operator: Exists
