# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - Grafana Configuration
# Phase: P033-P034 | Grafana installation + core dashboards
# -------------------------------------------------------------------

grafana:
  enabled: true

  replicas: 2

  image:
    repository: grafana/grafana
    tag: "10.4.0"

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  persistence:
    enabled: true
    storageClassName: gp3
    size: 20Gi

  # Admin credentials via Vault
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: istio
    annotations:
      kubernetes.io/tls-acme: "true"
    hosts:
      - grafana.internal.lastmilegig.aagais.co.za
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.internal.lastmilegig.aagais.co.za

  # Datasources - auto-provisioned
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          url: http://lmg-prometheus-kube-prometheus-prometheus.lmg-monitoring:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: "15s"
            httpMethod: POST

        - name: Loki
          type: loki
          uid: loki
          url: http://lmg-loki-gateway.lmg-monitoring:3100
          access: proxy
          jsonData:
            maxLines: 5000
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: "trace_id=(\\w+)"
                name: TraceID
                url: "$${__value.raw}"

        - name: Tempo
          type: tempo
          uid: tempo
          url: http://lmg-tempo-query-frontend.lmg-monitoring:3200
          access: proxy
          jsonData:
            tracesToLogs:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: true
            tracesToMetrics:
              datasourceUid: prometheus
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            lokiSearch:
              datasourceUid: loki

        - name: Jaeger
          type: jaeger
          uid: jaeger
          url: http://lmg-jaeger-query.lmg-monitoring:16686
          access: proxy

        - name: CloudWatch
          type: cloudwatch
          uid: cloudwatch
          jsonData:
            authType: default
            defaultRegion: af-south-1

  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "lmg-platform"
          orgId: 1
          folder: "Lastmile Gig"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/lmg-platform
        - name: "lmg-infrastructure"
          orgId: 1
          folder: "Infrastructure"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/lmg-infrastructure

  # Grafana plugins
  plugins:
    - grafana-piechart-panel
    - grafana-worldmap-panel
    - grafana-clock-panel
    - marcusolsson-treemap-panel
    - yesoreyeram-infinity-datasource

  # SMTP for alert notifications
  smtp:
    existingSecret: grafana-smtp-credentials
    userKey: user
    passwordKey: password

  grafana.ini:
    server:
      root_url: https://grafana.internal.lastmilegig.aagais.co.za
    auth:
      disable_login_form: false
    auth.generic_oauth:
      enabled: true
      name: Auth0
      allow_sign_up: true
      client_id: ${LMG_GRAFANA_AUTH0_CLIENT_ID}
      client_secret: ${LMG_GRAFANA_AUTH0_CLIENT_SECRET}
      scopes: openid profile email
      auth_url: https://${LMG_AUTH0_DOMAIN}/authorize
      token_url: https://${LMG_AUTH0_DOMAIN}/oauth/token
      api_url: https://${LMG_AUTH0_DOMAIN}/userinfo
      role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'ops') && 'Editor' || 'Viewer'"
    security:
      admin_user: admin
      cookie_secure: true
      strict_transport_security: true
    log:
      mode: console
      level: info
    alerting:
      enabled: true
    unified_alerting:
      enabled: true
