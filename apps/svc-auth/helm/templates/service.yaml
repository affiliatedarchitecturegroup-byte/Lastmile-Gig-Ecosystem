apiVersion: v1
kind: Service
metadata:
  name: {{ include "svc-auth.fullname" . }}
  namespace: lmg-core
  labels:
    app: svc-auth
    module: auth
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: svc-auth
