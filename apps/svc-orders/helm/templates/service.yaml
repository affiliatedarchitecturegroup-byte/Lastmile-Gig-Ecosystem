apiVersion: v1
kind: Service
metadata:
  name: {{ include "svc-orders.fullname" . }}
  namespace: lmg-core
  labels:
    app: {{ include "svc-orders.name" . }}
    app.kubernetes.io/name: {{ include "svc-orders.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "svc-orders.name" . }}
