# CI/CD Pipeline - IoT Telemetry Service (Rust)
#
# Builds, tests, lints, and creates Docker images for svc-iot.
#
# See: docs/specs/13_DEVOPS_CICD.md

name: svc-iot CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/svc-iot/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/svc-iot/**'

defaults:
  run:
    working-directory: apps/svc-iot

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/svc-iot/target/
          key: ${{ runner.os }}-cargo-iot-${{ hashFiles('apps/svc-iot/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake libsasl2-dev

      - name: Run cargo check
        run: cargo check --all-features

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/svc-iot/target/
          key: ${{ runner.os }}-cargo-iot-${{ hashFiles('apps/svc-iot/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake libsasl2-dev

      - name: Run tests
        run: cargo test --all-features -- --nocapture

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, fmt]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/svc-iot
          push: false
          tags: lastmilegig/svc-iot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
