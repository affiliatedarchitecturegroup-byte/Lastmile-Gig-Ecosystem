# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - Checkov IaC Scanning
# Phase: P055 | Checkov scan on all Terraform changes
# -------------------------------------------------------------------

name: Security - Checkov IaC Scan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "infrastructure/**/*.tf"
      - "infrastructure/**/*.hcl"
      - "infrastructure/**/*.yaml"
      - "infrastructure/**/*.yml"

jobs:
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov - Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false
          skip_check: CKV_AWS_144,CKV_AWS_145  # Cross-region replication (future phase)
          compact: true
          quiet: true

      - name: Run Checkov - Helm
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/helm
          framework: helm
          output_format: cli
          soft_fail: true  # Helm checks are advisory
          compact: true

      - name: Run Checkov - Kubernetes
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/k8s
          framework: kubernetes
          output_format: cli
          soft_fail: false
          compact: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
