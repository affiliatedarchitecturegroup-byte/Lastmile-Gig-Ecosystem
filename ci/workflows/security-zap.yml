# -------------------------------------------------------------------
# Lastmile Gig Ecosystem - OWASP ZAP DAST Scan
# Phase: P056 | Automated DAST on every staging deployment
# -------------------------------------------------------------------

name: Security - OWASP ZAP DAST

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to scan"
        required: true
        default: "https://staging.lastmilegig.aagais.co.za"
  deployment_status:
    types: [success]

env:
  TARGET_URL: ${{ github.event.inputs.target_url || 'https://staging.lastmilegig.aagais.co.za' }}

jobs:
  zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'staging')
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: >
            -a
            -j
            -T 60
          allow_issue_writing: false

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: "${{ env.TARGET_URL }}/api/docs/openapi.json"
          format: openapi
          cmd_options: "-T 120"
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30
