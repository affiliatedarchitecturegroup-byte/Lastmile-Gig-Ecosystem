version: '3.9'

# Lastmile Gig - Local Development Services
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  # --- PostgreSQL (mimics Supabase locally) ---
  postgres:
    image: postgres:16-alpine
    container_name: lmg-postgres
    restart: unless-stopped
    ports:
      - '54322:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lastmile_gig
    volumes:
      - lmg-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MongoDB ---
  mongodb:
    image: mongo:7
    container_name: lmg-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: lastmile_gig
    volumes:
      - lmg-mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: lmg-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - lmg-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Apache Kafka (via Redpanda for local dev) ---
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: lmg-kafka
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - '19092:19092'
      - '18082:18082'
    volumes:
      - lmg-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', 'rpk cluster health | grep -E "Healthy:.+true"']
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Elasticsearch (OpenSearch) ---
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: lmg-opensearch
    restart: unless-stopped
    ports:
      - '9200:9200'
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin_123!
    volumes:
      - lmg-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q green']
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Vault (dev mode) ---
  vault:
    image: hashicorp/vault:1.16
    container_name: lmg-vault
    restart: unless-stopped
    ports:
      - '8200:8200'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

volumes:
  lmg-postgres-data:
  lmg-mongo-data:
  lmg-redis-data:
  lmg-redpanda-data:
  lmg-opensearch-data:
